name: Fund Monitor

on:
  schedule:
    # 每天台灣時間 08:00, 13:00, 18:00, 22:00 執行 (換算為 UTC 時間)
    - cron: '0 0,5,10,14 * * *'
  workflow_dispatch: # 允許您在網頁上手動按「按鈕」執行

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予程式能寫入 JSON 的權限
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升級至 v4，消除過期警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級至 v5，消除過期警告
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_all.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 改用 *.json，一次存檔三大基金的獨立紀錄檔
          git add *.json
          git diff-index --quiet HEAD || git commit -m "Update multiple fund holdings"
          git push
